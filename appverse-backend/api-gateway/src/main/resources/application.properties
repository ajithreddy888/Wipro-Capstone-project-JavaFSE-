server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[1].id=app-service
spring.cloud.gateway.routes[1].uri=lb://app-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/apps/**

spring.cloud.gateway.routes[2].id=developer-service
spring.cloud.gateway.routes[2].uri=lb://developer-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/developer/**

spring.cloud.gateway.routes[3].id=ai-service
spring.cloud.gateway.routes[3].uri=lb://ai-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/ai/**


spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true